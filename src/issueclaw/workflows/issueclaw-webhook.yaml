# Installed by: issueclaw init (or issueclaw workflows upgrade)
# Upgrade after tool update: issueclaw workflows upgrade
# Logic lives in: aviadr1/issueclaw/.github/workflows/webhook.yml
#
# Required repository secrets:
#   LINEAR_API_KEY - Linear API key for fetching entity data
#
# Triggered by repository_dispatch from the CF Worker webhook proxy.

name: Apply Linear Webhook

on:
  repository_dispatch:
    types: [linear-webhook]

permissions:
  contents: write

# Must be in caller: concurrency groups are repo-scoped.
# Webhook debounce must not cancel push/sync runs.
# cancel-in-progress: true — debounce webhook bursts; keep latest event.
# 10-minute sync remains the eventual-consistency backstop.
concurrency:
  group: linear-git-webhook
  cancel-in-progress: true

jobs:
  apply-webhook:
    # Batch low-signal churn via periodic pull (documents).
    # Keep issue comment edits in realtime to avoid relying on issue.updatedAt
    # propagation semantics in Linear.
    if: ${{ !(github.event.client_payload.type == 'Document') && !(github.event.client_payload.type == 'Comment' && github.event.client_payload.data.issueId == null) }}
    uses: aviadr1/issueclaw/.github/workflows/webhook.yml@main
    with:
      # github.event is not available in the callee — pass payload as input
      webhook_payload: ${{ toJson(github.event.client_payload) }}
    secrets:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
