# Installed by: issueclaw init (or issueclaw workflows upgrade)
# Upgrade after tool update: issueclaw workflows upgrade
# Logic lives in: aviadr1/issueclaw/.github/workflows/sync.yml
#
# Required repository secrets:
#   LINEAR_API_KEY - Linear API key for fetching entity data
#
# Periodic full sync from Linear to ensure eventual consistency.
# Webhooks handle real-time updates but this is the correctness guarantee.

name: Sync from Linear

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes (batch low-signal webhook churn)
  workflow_dispatch:

permissions:
  contents: write

# Must be in caller: concurrency groups are repo-scoped.
# Sync is isolated from push/webhook to prevent cross-workflow cancellation.
# cancel-in-progress: false — never drop a scheduled sync run.
concurrency:
  group: linear-git-sync-pull
  cancel-in-progress: false

jobs:
  sync:
    uses: aviadr1/issueclaw/.github/workflows/sync.yml@main
    secrets:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
