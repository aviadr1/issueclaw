# GitHub Actions workflow for the TARGET repo (e.g., gigaverse-app/linear-git).
# Copy this file to .github/workflows/issueclaw-push.yaml in your target repo.
#
# Required repository secrets:
#   LINEAR_API_KEY - Linear API key for pushing updates
#
# Triggered when linear/** files are modified on main.
# Skips if the commit was made by issueclaw-bot (loop prevention).

name: Push Changes to Linear

on:
  push:
    branches: [main]
    paths:
      - "linear/**"

permissions:
  contents: write

jobs:
  push-to-linear:
    runs-on: ubuntu-latest
    # Loop prevention: skip commits made by the bot itself
    if: github.event.head_commit.author.name != 'issueclaw-bot'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need parent commit for diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install issueclaw
        run: pip install issueclaw

      - name: Push changes to Linear
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: issueclaw push

      - name: Commit updated sync state
        run: |
          git config user.name "issueclaw-bot"
          git config user.email "issueclaw-bot@users.noreply.github.com"
          git add .sync/
          if git diff --cached --quiet; then
            echo "No sync state changes"
          else
            git commit -m "sync: update sync state after push to Linear"
            git push
          fi
