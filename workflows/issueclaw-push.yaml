# Installed by: issueclaw init (or issueclaw workflows upgrade)
# Upgrade after tool update: issueclaw workflows upgrade
# Logic lives in: aviadr1/issueclaw/.github/workflows/push.yml
#
# Required repository secrets:
#   LINEAR_API_KEY - Linear API key for pushing updates
#
# Triggered when linear/** files are modified on main.
# Skips if the commit was made by issueclaw-bot (loop prevention).

name: Push Changes to Linear

on:
  push:
    branches: [main]
    paths:
      - "linear/**"

permissions:
  contents: write

# Must be in caller: concurrency groups are repo-scoped.
# Shared with sync and webhook so all queue behind each other.
concurrency:
  group: linear-git-sync
  cancel-in-progress: false

jobs:
  push-to-linear:
    # Loop prevention: skip commits made by the bot itself
    if: github.event.head_commit.author.name != 'issueclaw-bot'
    uses: aviadr1/issueclaw/.github/workflows/push.yml@main
    secrets:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
