# Installed by: issueclaw init (or issueclaw workflows upgrade)
# Upgrade after tool update: issueclaw workflows upgrade
# Logic lives in: aviadr1/issueclaw/.github/workflows/webhook.yml
#
# Required repository secrets:
#   LINEAR_API_KEY - Linear API key for fetching entity data
#
# Triggered by repository_dispatch from the CF Worker webhook proxy.

name: Apply Linear Webhook

on:
  repository_dispatch:
    types: [linear-webhook]

permissions:
  contents: write

# Must be in caller: concurrency groups are repo-scoped.
# Shared with sync and push so all queue behind each other.
# cancel-in-progress: false — process every webhook in order.
concurrency:
  group: linear-git-sync
  cancel-in-progress: false

jobs:
  apply-webhook:
    uses: aviadr1/issueclaw/.github/workflows/webhook.yml@main
    with:
      # github.event is not available in the callee — pass payload as input
      webhook_payload: ${{ toJson(github.event.client_payload) }}
    secrets:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
