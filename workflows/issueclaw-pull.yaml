# GitHub Actions workflow for the TARGET repo (e.g., gigaverse-app/linear-git).
# Copy this file to .github/workflows/issueclaw-pull.yaml in your target repo.
#
# Required repository secrets:
#   LINEAR_API_KEY - Linear API key for fetching data
#
# Runs a full pull sync on schedule and on manual trigger.

name: Pull Linear Data

on:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  pull-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install issueclaw
        run: pip install issueclaw

      - name: Pull Linear data
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: issueclaw pull

      - name: Commit and push changes
        run: |
          git config user.name "issueclaw-bot"
          git config user.email "issueclaw-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: pull Linear data (scheduled)"
            git push
          fi
