version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 10
    groups:
      pip-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "patch"
      pip-minor:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
      pip-security:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:15"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 10
    groups:
      actions-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "patch"
      actions-minor:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
